<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vidplayer one</title>

<style>
body{
    margin:0;
    background:#141414;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#000;
    padding:15px 25px;
    font-size:28px;
    color:#e50914;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.player-box{
    background:#1f1f1f;
    border-radius:15px;
    padding:15px;
}

video{
    width:100%;
    border-radius:10px;
}

.title{
    margin-top:15px;
    font-size:24px;
}

.controls{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    background:#e50914;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.list{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:130px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    font-size:15px;
}
</style>
</head>
<body>

<header>VIDPLAYER ONE</header>

<div class="container">

<div class="player-box">

<video id="player" controls autoplay></video>

<div class="title" id="judul"></div>

<div class="controls">
<button onclick="prevVideo()">⏮PREVIOUSLY </button>
<button onclick="nextVideo()">⏭ NEXT</button>
</div>

</div>

<h2 style="margin-top:30px;">Koleksi Video</h2>

<div class="list" id="videoList"></div>

</div>

<script>

let videos = [];
let currentIndex = 0;

fetch("videos.json")
.then(res => res.json())
.then(data => {

videos = data;

renderList();
loadVideo(0);

});

function loadVideo(index){

currentIndex = index;

document.getElementById("player").src =
videos[index].video;

document.getElementById("judul").innerText =
videos[index].title;

}

function nextVideo(){

if(currentIndex < videos.length - 1){
loadVideo(currentIndex + 1);
}

}

function prevVideo(){

if(currentIndex > 0){
loadVideo(currentIndex - 1);
}

}

function renderList(){

let html = "";

videos.forEach((v,i)=>{

html += `
<div class="card" onclick="loadVideo(${i})">
<img src="${v.thumb}">
<h3>${v.title}</h3>
</div>
`;

});

document.getElementById("videoList").innerHTML = html;

}

document.addEventListener("ended",function(){
nextVideo();
});

</script>

</body>
</html>
