<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidplayerOnne - Premium CDN Video Platform</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1a1a1a;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e50914;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 { margin: 0; color: #e50914; font-size: 24px; cursor: pointer; }
        .search-container { display: flex; width: 40%; }
        .search-container input {
            width: 100%; padding: 10px; border: none;
            background-color: #2b2b2b; color: white; border-radius: 4px 0 0 4px;
        }
        .search-container button {
            padding: 10px 20px; border: none; background-color: #e50914;
            color: white; cursor: pointer; border-radius: 0 4px 4px 0; font-weight: bold;
        }

        /* Area Iklan Atas */
        .top-ad-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 5% 0 5%;
        }

        /* Layout Utama */
        .main-layout { 
            display: flex; 
            padding: 2% 5% 3% 5%; 
            gap: 30px; 
        }
        
        /* Konten Kiri (Player & Daftar Video) */
        .content-area { 
            flex: 3; 
        }
        
        /* Konten Kanan (Tempat Iklan Samping) */
        .sidebar-ads { 
            flex: 1; 
            min-width: 320px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        /* Video Player Box */
        .player-box { background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; display: none; }
        video { width: 100%; display: block; aspect-ratio: 16/9; }
        .player-info { padding: 15px; background: #1c1c1c; display: flex; justify-content: space-between; align-items: center; }
        .share-btn { background: #e50914; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .share-btn:hover { background: #b80710; }

        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .video-card { background: #1c1c1c; border-radius: 6px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .video-card:hover { transform: scale(1.04); }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #2c2c2c; }
        .video-card h4 { margin: 10px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        @media (max-width: 992px) {
            .main-layout { flex-direction: column; }
            .search-container { width: 60%; }
            .sidebar-ads { min-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1 onclick="window.location.href=window.location.pathname">VidplayerOnne</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search videos here..." onkeyup="filterVideo()">
            <button onclick="filterVideo()">Search</button>
        </div>
    </header>

    <div class="top-ad-container">
        <script>
            atOptions = {
                'key' : 'f8d067b8c0219dbeaaf54694a2222748',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script src="https://momrollback.com/f8d067b8c0219dbeaaf54694a2222748/invoke.js"></script>
    </div>

    <div class="main-layout">
        
        <div class="content-area">
            <div class="player-box" id="playerBox">
                <video id="mainVideoPlayer" controls autoplay></video>
                <div class="player-info">
                    <h2 id="playingTitle" style="margin:0; font-size:18px;"></h2>
                    <button class="share-btn" onclick="salinLinkVideo()">Copy Link</button>
                </div>
            </div>

            <h3 style="margin-top:0;">All Videos</h3>
            <div id="loadingText">Loading videos...</div>
            <div class="video-grid" id="videoGrid"></div>
        </div>

        <div class="sidebar-ads">
            <div>
                <script>
                    atOptions = {
                        'key' : 'f8d067b8c0219dbeaaf54694a2222748',
                        'format' : 'iframe',
                        'height' : 50,
                        'width' : 320,
                        'params' : {}
                    };
                </script>
                <script src="https://momrollback.com/f8d067b8c0219dbeaaf54694a2222748/invoke.js"></script>
            </div>
        </div>

    </div>

    <script>
        const jsonUrl = "video.json";
        let semuaVideo = [];

        async function ambilDataVideo() {
            try {
                const respon = await fetch(`${jsonUrl}?t=${new Date().getTime()}`);
                semuaVideo = await respon.json();

                document.getElementById('loadingText').style.display = 'none';
                tampilkanGrid(semuaVideo);

                cekParameterUrl();
            } catch (error) {
                document.getElementById('loadingText').innerText = 'Failed to load video data.';
                console.error(error);
            }
        }

        function tampilkanGrid(daftarVideo) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';

            if(daftarVideo.length === 0) {
                grid.innerHTML = '<p>No videos found.</p>';
                return;
            }

            daftarVideo.forEach((video) => {
                grid.innerHTML += `
                    <div class="video-card" onclick="pilihVideo('${encodeURIComponent(video.judul)}')">
                        <img src="${video.thumbnail}" alt="${video.judul}">
                        <h4>${video.judul}</h4>
                    </div>
                `;
            });
        }

        function pilihVideo(judulTerencode) {
            const judul = decodeURIComponent(judulTerencode);
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?v=' + judulTerencode;
            window.history.pushState({path:newUrl}, '', newUrl);
            
            const video = semuaVideo.find(v => v.judul === judul);
            if(video) {
                eksekusiPutar(video.judul, video.cdn_url);
            }
        }

        function eksekusiPutar(judul, urlCdn) {
            const playerBox = document.getElementById('playerBox');
            const videoPlayer = document.getElementById('mainVideoPlayer');
            const playingTitle = document.getElementById('playingTitle');

            playingTitle.innerText = judul;
            videoPlayer.src = urlCdn;
            playerBox.style.display = 'block';
            
            playerBox.scrollIntoView({ behavior: 'smooth' });
            videoPlayer.play();
        }

        function cekParameterUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoJudul = urlParams.get('v');
            
            if (videoJudul) {
                const judulNyata = decodeURIComponent(videoJudul);
                const video = semuaVideo.find(v => v.judul === judulNyata);
                if (video) {
                    eksekusiPutar(video.judul, video.cdn_url);
                }
            }
        }

        function salinLinkVideo() {
            navigator.clipboard.writeText(window.location.href);
            alert("Video link copied to clipboard! You can share it now.");
        }

        function filterVideo() {
            const kataKunci = document.getElementById('searchInput').value.toLowerCase();
            const hasilFilter = semuaVideo.filter(v => v.judul.toLowerCase().includes(kataKunci));
            tampilkanGrid(hasilFilter);
        }

        ambilDataVideo();
    </script>
</body>
</html>
