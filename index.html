<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidplayerOnne - Premium CDN Video Platform</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1a1a1a;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e50914;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 { margin: 0; color: #e50914; font-size: 24px; }
        .search-container { display: flex; width: 40%; }
        .search-container input {
            width: 100%; padding: 10px; border: none;
            background-color: #2b2b2b; color: white; border-radius: 4px 0 0 4px;
        }
        .search-container button {
            padding: 10px 20px; border: none; background-color: #e50914;
            color: white; cursor: pointer; border-radius: 0 4px 4px 0; font-weight: bold;
        }

        /* Main Layout */
        .main-layout { display: flex; padding: 3% 5%; gap: 30px; }
        .content-area { flex: 3; }
        .sidebar-ads { flex: 1; min-width: 280px; }

        /* Video Player Box */
        .player-box { background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; display: none; }
        video { width: 100%; display: block; aspect-ratio: 16/9; }
        .player-info { padding: 15px; background: #1c1c1c; }

        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .video-card { background: #1c1c1c; border-radius: 6px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .video-card:hover { transform: scale(1.04); }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #2c2c2c; }
        .video-card h4 { margin: 10px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Advertising Slots */
        .ad-slot { background: #1a1a1a; border: 2px dashed #444; border-radius: 8px; min-height: 250px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #666; margin-bottom: 20px; text-align: center; padding: 10px; }
        
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .search-container { width: 60%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>VidplayerOnne</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search videos here..." onkeyup="filterVideo()">
            <button onclick="filterVideo()">Search</button>
        </div>
    </header>

    <div class="main-layout">
        <div class="content-area">
            <div class="player-box" id="playerBox">
                <video id="mainVideoPlayer" controls autoplay></video>
                <div class="player-info">
                    <h2 id="playingTitle" style="margin:0; font-size:18px;"></h2>
                </div>
            </div>

            <h3 style="margin-top:0;">All Videos</h3>
            <div id="loadingText">Loading videos from Google Sheets...</div>
            <div class="video-grid" id="videoGrid"></div>
        </div>

        <div class="sidebar-ads">
            <div class="ad-slot">
                <strong>ADVERTISEMENT SLOT 1 (300x250)</strong>
                <p style="font-size:12px;">Place your Google AdSense code or Banner image here</p>
            </div>
            <div class="ad-slot">
                <strong>ADVERTISEMENT SLOT 2</strong>
                <p style="font-size:12px;">Sponsor / Custom Ads</p>
            </div>
        </div>
    </div>

    <script>
        // Your Google Sheets CSV Link
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTBasVxwifd3tXod6A3KQHdO8UHMvmoskYgiRmb0k--J52RvO8HBjBGEn2mN63UGr30dq20EQPPE6bE/pub?output=csv";

        let semuaVideo = [];

        // Function to parse CSV data into Array
        function parseCSV(text) {
            let lines = text.split("\n");
            let result = [];
            
            // Start from row 2 (index 1) to skip table headers
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                let data = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                let judul = data[0] ? data[0].replace(/^"|"$/g, '').trim() : '';
                let cdn_url = data[1] ? data[1].replace(/^"|"$/g, '').trim() : '';
                let thumbnail = data[2] ? data[2].replace(/^"|"$/g, '').trim() : '';
                
                if (judul && cdn_url) {
                    result.push({
                        judul: judul,
                        cdn_url: cdn_url,
                        thumbnail: thumbnail || 'https://via.placeholder.com/600x340/222/fff?text=No+Thumb'
                    });
                }
            }
            return result;
        }

        // Fetch data from Google Sheets
        async function ambilDataVideo() {
            try {
                const respon = await fetch(csvUrl);
                const teks = await respon.text();
                
                semuaVideo = parseCSV(teks);

                document.getElementById('loadingText').style.display = 'none';
                tampilkanGrid(semuaVideo);
            } catch (error) {
                document.getElementById('loadingText').innerText = 'Failed to load video data. Please ensure your Google Sheet is published to the web.';
                console.error(error);
            }
        }

        // Display video cards into grid
        function tampilkanGrid(daftarVideo) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';

            if(daftarVideo.length === 0) {
                grid.innerHTML = '<p>No videos found.</p>';
                return;
            }

            daftarVideo.forEach((video) => {
                grid.innerHTML += `
                    <div class="video-card" onclick="putarVideo('${encodeURIComponent(video.judul)}', '${video.cdn_url}')">
                        <img src="${video.thumbnail}" alt="${video.judul}">
                        <h4>${video.judul}</h4>
                    </div>
                `;
            });
        }

        // Play video when card is clicked
        function putarVideo(judul, urlCdn) {
            const playerBox = document.getElementById('playerBox');
            const videoPlayer = document.getElementById('mainVideoPlayer');
            const playingTitle = document.getElementById('playingTitle');

            playingTitle.innerText = decodeURIComponent(judul);
            videoPlayer.src = urlCdn;
            playerBox.style.display = 'block';
            
            playerBox.scrollIntoView({ behavior: 'smooth' });
            videoPlayer.play();
        }

        // Filter/Search video functionality
        function filterVideo() {
            const kataKunci = document.getElementById('searchInput').value.toLowerCase();
            const hasilFilter = semuaVideo.filter(v => v.judul.toLowerCase().includes(kataKunci));
            tampilkanGrid(hasilFilter);
        }

        // Initialize fetching on page load
        ambilDataVideo();
    </script>
</body>
</html>
